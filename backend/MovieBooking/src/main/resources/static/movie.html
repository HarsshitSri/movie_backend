<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie · Movie Platform</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/index.html">Movie<span>Platform</span></a>
      <nav class="nav">
        <a href="/index.html" data-nav="index.html">Home</a>
        <a href="/movies.html" data-nav="movies.html">Movies</a>
        <a href="/watchlist.html" data-nav="watchlist.html" data-auth-only>Watchlist</a>
        <a href="/movie-form.html" data-nav="movie-form.html" data-admin-only>Add movie</a>
        <a href="/login.html" data-nav="login.html">Login</a>
        <a href="/register.html" data-nav="register.html">Register</a>
        <button type="button" class="btn btn-secondary" id="logout-btn">Log out</button>
        <span class="auth-state" id="auth-state"></span>
      </nav>
    </div>
  </header>

  <main>
    <div id="msg" class="msg"></div>

    <section class="panel" id="movie-panel">
      <p class="muted">Loading…</p>
    </section>

    <section class="panel">
      <h2>Rate this movie</h2>
      <p class="muted">Sign in to leave a score from 1 to 10.</p>
      <form id="rate-form">
        <div class="field">
          <label for="rating">Rating (1–10)</label>
          <input id="rating" type="number" min="1" max="10" required />
        </div>
        <button class="btn" type="submit">Submit rating</button>
      </form>
    </section>

    <section class="panel">
      <h2>Write a review</h2>
      <p class="muted">Share your thoughts (up to 2000 characters).</p>
      <form id="review-form">
        <div class="field">
          <label for="review-body">Your review</label>
          <textarea id="review-body" rows="4" maxlength="2000" required></textarea>
        </div>
        <div class="btn-row">
          <button class="btn" type="submit">Save review</button>
          <button class="btn btn-secondary" type="button" id="delete-review-btn">Delete my review</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Reviews</h2>
      <div id="reviews-list"><p class="muted">Loading…</p></div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const movieId = qs("id");
    const msg = document.getElementById("msg");
    const panel = document.getElementById("movie-panel");
    let onWatchlist = false;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function refreshWatchlistButton() {
      const btn = document.getElementById("watchlist-btn");
      if (!btn) return;
      if (!Auth.isLoggedIn()) {
        btn.style.display = "none";
        return;
      }
      btn.style.display = "";
      try {
        const status = await api("/api/watchlist/" + movieId + "/status", { auth: true });
        onWatchlist = Boolean(status.onWatchlist);
        btn.textContent = onWatchlist ? "Remove from watchlist" : "Add to watchlist";
      } catch (_) {
        onWatchlist = false;
        btn.textContent = "Add to watchlist";
      }
    }

    async function loadReviews() {
      const list = document.getElementById("reviews-list");
      if (!movieId) {
        list.innerHTML = '<p class="muted">No movie selected.</p>';
        return;
      }
      try {
        const reviews = await api("/api/movies/" + movieId + "/reviews");
        if (!reviews.length) {
          list.innerHTML = '<p class="muted">No reviews yet.</p>';
          return;
        }
        const myId = Auth.userId() ? Number(Auth.userId()) : null;
        list.innerHTML = reviews.map((r) => {
          const mine = myId != null && r.userId === myId;
          return (
            '<div class="review-item">' +
            "<strong>" + escapeHtml(r.username || ("User " + r.userId)) + "</strong>" +
            (mine ? ' <span class="muted">(you)</span>' : "") +
            '<p>' + escapeHtml(r.body) + "</p>" +
            '<p class="muted" style="margin:0;font-size:0.8rem">' +
            escapeHtml(String(r.updatedAt || r.createdAt || "")) +
            "</p></div>"
          );
        }).join("");

        const mine = reviews.find((r) => myId != null && r.userId === myId);
        if (mine) {
          document.getElementById("review-body").value = mine.body || "";
        }
      } catch (err) {
        list.innerHTML = '<p class="muted">Could not load reviews.</p>';
        showMessage(msg, err.message, "error");
      }
    }

    async function loadMovie() {
      if (!movieId) {
        panel.innerHTML = '<p class="muted">Missing movie id. Go back to <a href="/movies.html">Movies</a>.</p>';
        return;
      }
      try {
        const m = await api("/api/movies/" + movieId);
        document.title = m.title + " · Movie Platform";
        panel.innerHTML =
          '<div class="poster-placeholder">Poster of the movie</div>' +
          "<h1 style=\"margin:0.85rem 0 0.35rem;font-size:1.5rem\">" + escapeHtml(m.title) + "</h1>" +
          '<div class="movie-meta">' +
          "<span>" + (m.releaseDate || "—") + "</span>" +
          "<span>" + (m.runtimeMinutes || "—") + " min</span>" +
          "<span>" + escapeHtml(m.language || "") + "</span>" +
          "<span>" + escapeHtml(m.contentRating || "") + "</span>" +
          "<span>Avg " + (m.averageRating ?? 0) + " · " + (m.ratingCount ?? 0) + " ratings</span>" +
          "</div>" +
          '<p class="synopsis">' + escapeHtml(m.synopsis || "") + "</p>" +
          '<div class="btn-row">' +
          '<a class="btn btn-secondary" href="/movies.html">Back to list</a>' +
          '<button type="button" class="btn btn-secondary" id="watchlist-btn">Add to watchlist</button>' +
          (Auth.isAdmin()
            ? '<button type="button" class="btn btn-danger" id="delete-btn">Delete</button>'
            : "") +
          "</div>";

        const deleteBtn = document.getElementById("delete-btn");
        if (deleteBtn) {
          deleteBtn.addEventListener("click", async () => {
            if (!confirm("Delete this movie?")) return;
            clearMessage(msg);
            try {
              await api("/api/movies/" + movieId, { method: "DELETE", auth: true });
              showMessage(msg, "Deleted. Redirecting…", "ok");
              setTimeout(() => (window.location.href = "/movies.html"), 500);
            } catch (err) {
              showMessage(msg, err.message, "error");
            }
          });
        }

        const wlBtn = document.getElementById("watchlist-btn");
        if (wlBtn) {
          wlBtn.addEventListener("click", async () => {
            clearMessage(msg);
            if (!Auth.isLoggedIn()) {
              showMessage(msg, "Please log in first.", "error");
              return;
            }
            try {
              if (onWatchlist) {
                await api("/api/watchlist/" + movieId, { method: "DELETE", auth: true });
                showMessage(msg, "Removed from watchlist.", "ok");
              } else {
                await api("/api/watchlist/" + movieId, { method: "POST", auth: true });
                showMessage(msg, "Added to watchlist.", "ok");
              }
              await refreshWatchlistButton();
            } catch (err) {
              showMessage(msg, err.message, "error");
            }
          });
        }

        await refreshWatchlistButton();
      } catch (err) {
        panel.innerHTML = '<p class="muted">Could not load movie.</p>';
        showMessage(msg, err.message, "error");
      }
    }

    document.getElementById("rate-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage(msg);
      if (!movieId) return;
      try {
        await api("/api/movies/" + movieId + "/ratings", {
          method: "POST",
          auth: true,
          body: { rating: Number(document.getElementById("rating").value) }
        });
        showMessage(msg, "Rating saved.", "ok");
        loadMovie();
      } catch (err) {
        showMessage(msg, err.message, "error");
      }
    });

    document.getElementById("review-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage(msg);
      if (!movieId) return;
      try {
        await api("/api/movies/" + movieId + "/reviews", {
          method: "POST",
          auth: true,
          body: { body: document.getElementById("review-body").value.trim() }
        });
        showMessage(msg, "Review saved.", "ok");
        loadReviews();
      } catch (err) {
        showMessage(msg, err.message, "error");
      }
    });

    document.getElementById("delete-review-btn").addEventListener("click", async () => {
      clearMessage(msg);
      if (!movieId || !Auth.isLoggedIn()) {
        showMessage(msg, "Please log in first.", "error");
        return;
      }
      if (!confirm("Delete your review for this movie?")) return;
      try {
        await api("/api/movies/" + movieId + "/reviews/me", { method: "DELETE", auth: true });
        document.getElementById("review-body").value = "";
        showMessage(msg, "Review deleted.", "ok");
        loadReviews();
      } catch (err) {
        showMessage(msg, err.message, "error");
      }
    });

    loadMovie();
    loadReviews();
  </script>
</body>
</html>
