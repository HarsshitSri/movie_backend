<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movies · Movie Platform</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/index.html">Movie<span>Platform</span></a>
      <nav class="nav">
        <a href="/index.html" data-nav="index.html">Home</a>
        <a href="/movies.html" data-nav="movies.html">Movies</a>
        <a href="/watchlist.html" data-nav="watchlist.html" data-auth-only>Watchlist</a>
        <a href="/movie-form.html" data-nav="movie-form.html" data-admin-only>Add movie</a>
        <a href="/login.html" data-nav="login.html">Login</a>
        <a href="/register.html" data-nav="register.html">Register</a>
        <button type="button" class="btn btn-secondary" id="logout-btn">Log out</button>
        <span class="auth-state" id="auth-state"></span>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Movies</h1>
      <p>Browse titles in the collection.</p>
    </section>

    <div id="msg" class="msg"></div>

    <section class="panel">
      <div class="toolbar">
        <div class="field">
          <label for="size">Per page</label>
          <input id="size" type="number" min="1" max="50" value="10" />
        </div>
        <div class="field">
          <label for="sort">Sort</label>
          <select id="sort">
            <option value="title">Title</option>
            <option value="releaseDate">Release date</option>
            <option value="averageRating">Rating</option>
            <option value="id">Newest</option>
          </select>
        </div>
        <div class="field">
          <label for="direction">Order</label>
          <select id="direction">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
          </select>
        </div>
        <button class="btn" type="button" id="reload-btn">Apply</button>
        <a class="btn btn-secondary" href="/movie-form.html" data-admin-only>Add movie</a>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Year</th>
              <th>Rating</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="movies-body">
            <tr><td colspan="4" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pager">
        <p class="muted pager-info" id="page-info"></p>
        <div class="pager-actions">
          <button type="button" class="btn btn-secondary" id="prev-btn" disabled>Previous</button>
          <button type="button" class="btn btn-secondary" id="next-btn" disabled>Next</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    let currentPage = 0;
    let totalPages = 1;

    async function loadMovies() {
      const msg = document.getElementById("msg");
      const body = document.getElementById("movies-body");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      clearMessage(msg);
      const size = document.getElementById("size").value || 10;
      const sort = document.getElementById("sort").value;
      const direction = document.getElementById("direction").value;
      const url =
        "/api/movies?page=" + currentPage +
        "&size=" + size +
        "&sort=" + encodeURIComponent(sort) +
        "&direction=" + encodeURIComponent(direction);
      try {
        const data = await api(url);
        const rows = data.content || [];
        if (!rows.length) {
          body.innerHTML = '<tr><td colspan="4" class="muted">No movies in the collection yet.</td></tr>';
        } else {
          body.innerHTML = rows.map((m) => {
            const year = m.releaseDate ? String(m.releaseDate).slice(0, 4) : "—";
            const rating = m.averageRating != null ? m.averageRating : "—";
            return (
              "<tr>" +
              "<td>" + escapeHtml(m.title) + "</td>" +
              "<td>" + year + "</td>" +
              "<td>" + rating + " (" + (m.ratingCount || 0) + ")</td>" +
              '<td><a href="/movie.html?id=' + m.id + '">View</a></td>' +
              "</tr>"
            );
          }).join("");
        }

        currentPage = data.number ?? currentPage;
        totalPages = Math.max(data.totalPages ?? 1, 1);
        const displayPage = currentPage + 1;
        document.getElementById("page-info").textContent =
          "Page " + displayPage + " of " + totalPages +
          " · " + (data.totalElements ?? 0) + " movies";

        prevBtn.disabled = currentPage <= 0;
        nextBtn.disabled = currentPage >= totalPages - 1;
      } catch (err) {
        body.innerHTML = '<tr><td colspan="4" class="muted">Could not load movies.</td></tr>';
        document.getElementById("page-info").textContent = "";
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        showMessage(msg, err.message, "error");
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("reload-btn").addEventListener("click", () => {
      currentPage = 0;
      loadMovies();
    });

    document.getElementById("prev-btn").addEventListener("click", () => {
      if (currentPage <= 0) return;
      currentPage -= 1;
      loadMovies();
    });

    document.getElementById("next-btn").addEventListener("click", () => {
      if (currentPage >= totalPages - 1) return;
      currentPage += 1;
      loadMovies();
    });

    loadMovies();
  </script>
</body>
</html>
