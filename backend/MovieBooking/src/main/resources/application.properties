spring.application.name=moviebooking

# Defaults match local Docker Compose (host port 5434 → container 5432).
# Override with env vars (DB_URL, DB_USERNAME, DB_PASSWORD) when needed.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/movie_booking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:000}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForMovieBookingBackendProject123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}
